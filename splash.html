<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Carregando…</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Quicksand:wght@500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-user-select: none; user-select: none; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent;
    font-family: 'Quicksand', sans-serif;
  }

  .splash {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 22px;
    border-radius: 26px;
    position: relative;
    background:
      radial-gradient(circle at 30% 20%, rgba(255,45,135,0.35), transparent 60%),
      radial-gradient(circle at 75% 80%, rgba(20,199,173,0.30), transparent 60%),
      #1a0f18;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.06) inset, 0 20px 60px rgba(0,0,0,0.45);
    overflow: hidden;
  }

  /* brilho de fundo pulsando */
  .glow {
    position: absolute;
    width: 260px;
    height: 260px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,45,135,0.45), transparent 70%);
    filter: blur(10px);
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(0.9); opacity: 0.6; }
    50%      { transform: scale(1.15); opacity: 1; }
  }

  /* personagem dançando */
  .dancer {
    position: relative;
    z-index: 2;
    width: 110px;
    height: 110px;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: bounce 0.9s ease-in-out infinite;
  }

  .dancer img {
    width: 92px;
    height: 92px;
    /* border-radius: 50px; */
    object-fit: cover;
    /* box-shadow: 0 10px 28px rgba(255,45,135,0.45), 0 0 0 3px rgba(255,255,255,0.18); */
    animation: wiggle 0.9s ease-in-out infinite;
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-18px); }
  }
  @keyframes wiggle {
    0%, 100% { transform: rotate(-8deg); }
    50%      { transform: rotate(8deg); }
  }

  /* "pezinhos" / sombra que acompanha o pulo */
  .shadow {
    position: relative;
    z-index: 1;
    width: 60px;
    height: 12px;
    border-radius: 50%;
    background: rgba(0,0,0,0.35);
    filter: blur(2px);
    animation: shrink 0.9s ease-in-out infinite;
    margin-top: -14px;
  }
  @keyframes shrink {
    0%, 100% { transform: scale(1); opacity: 0.5; }
    50%      { transform: scale(0.55); opacity: 0.2; }
  }

  /* notas musicais flutuando, dando o ar de "dançando" */
  .note {
    position: absolute;
    color: #ff6fb0;
    font-size: 18px;
    opacity: 0;
    animation: floatNote 1.8s ease-in infinite;
  }
  .note.n1 { left: calc(50% - 70px); top: 38%; animation-delay: 0s; }
  .note.n2 { left: calc(50% + 55px); top: 42%; color: #14c7ad; animation-delay: 0.6s; }
  .note.n3 { left: calc(50% - 40px); top: 30%; animation-delay: 1.1s; }

  @keyframes floatNote {
    0%   { opacity: 0; transform: translateY(0) scale(0.6) rotate(-10deg); }
    20%  { opacity: 1; }
    100% { opacity: 0; transform: translateY(-46px) scale(1.1) rotate(12deg); }
  }

  .brand {
    z-index: 2;
    font-family: 'Baloo 2', cursive;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: 0.3px;
    background: linear-gradient(90deg, #ff2d87, #14c7ad);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .status {
    z-index: 2;
    font-size: 13px;
    color: rgba(255,255,255,0.65);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .dots span {
    display: inline-block;
    width: 5px;
    height: 5px;
    margin-left: 3px;
    border-radius: 50%;
    background: #ff6fb0;
    animation: dotPulse 1.2s ease-in-out infinite;
  }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotPulse {
    0%, 80%, 100% { opacity: 0.25; transform: translateY(0); }
    40%           { opacity: 1; transform: translateY(-3px); }
  }

  .bar-track {
    z-index: 2;
    width: 160px;
    height: 5px;
    border-radius: 4px;
    background: rgba(255,255,255,0.12);
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    width: 40%;
    border-radius: 4px;
    background: linear-gradient(90deg, #ff2d87, #14c7ad);
    animation: loadBar 1.3s ease-in-out infinite;
  }
  @keyframes loadBar {
    0%   { transform: translateX(-100%); }
    100% { transform: translateX(250%); }
  }
</style>
</head>
<body>
  <div class="splash">
    <div class="glow"></div>

    <span class="note n1">♪</span>
    <span class="note n2">♫</span>
    <span class="note n3">♪</span>

    <div class="dancer"><img src="icon.png" alt=""></div>
    <div class="shadow"></div>

    <div class="brand">Mimo &amp; Arte</div>

    <div class="bar-track"><div class="bar-fill"></div></div>

    <div class="status">Carregando seu app<span class="dots"><span></span><span></span><span></span></span></div>
  </div>
</body>
</html>
